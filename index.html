<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIVATE BOX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #ffd6e0, #cde7ff);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    font-weight: bold;
    font-size: 22px;
    color: #ff4d6d;
}

.cart-icon {
    position: relative;
    cursor: pointer;
    font-size: 24px;
}

.cart-count {
    position: absolute;
    top: -8px;
    right: -10px;
    background: #ff4d6d;
    color: white;
    border-radius: 50%;
    padding: 3px 7px;
    font-size: 12px;
}

/* PRODUCTS */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 20px;
    padding: 20px;
}

.product {
    background: white;
    border-radius: 20px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.product:hover {
    transform: translateY(-8px) scale(1.03);
}

.product img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 15px;
}

.price {
    margin: 10px 0;
    color: #ff4d6d;
    font-weight: bold;
}

.add-btn {
    background: linear-gradient(45deg, #ff7eb3, #ff758c);
    border: none;
    padding: 10px 14px;
    border-radius: 50%;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.add-btn:hover {
    transform: scale(1.2) rotate(10deg);
}

/* POPUP */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) scale(0);
    background: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.3s;
    z-index: 100;
}

.popup.active {
    transform: translate(-50%,-50%) scale(1);
}

.popup input {
    width: 70px;
    padding: 8px;
    margin: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.popup button {
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
}

/* CART */
.cart-page {
    position: fixed;
    right: -100%;
    top: 0;
    width: 350px;
    height: 100%;
    background: white;
    padding: 20px;
    transition: 0.4s;
    box-shadow: -5px 0 15px rgba(0,0,0,0.2);
}

.cart-page.active {
    right: 0;
}

.cart-item {
    margin: 10px 0;
}

/* BUTTON */
.checkout-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg,#ff7eb3,#ff4d6d);
    border: none;
    border-radius: 20px;
    color: white;
    font-size: 16px;
    margin-top: 10px;
}

/* FLY EFFECT */
.fly {
    position: absolute;
    width: 60px;
    border-radius: 10px;
    z-index: 999;
    transition: all 1s ease-in-out;
}
</style>
</head>

<body>

<div class="header">
    💖 PRIVATE BOX
    <div class="cart-icon" onclick="openCart()">
        🛒 <span class="cart-count" id="count">0</span>
    </div>
</div>

<div class="container" id="products"></div>

<div class="popup" id="popup">
    <h3>Chọn số lượng 💕</h3>
    <input type="number" id="quantity" value="1" min="1">
    <br><br>
    <button onclick="addToCart()">Thêm vào giỏ hàng</button>
</div>

<div class="cart-page" id="cartPage">
    <h2>🛍 Giỏ hàng</h2>
    <div id="cartItems"></div>
    <h3 id="total"></h3>
    <button class="checkout-btn" onclick="checkout()">Thanh toán</button>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
const products = [
{name:"Bao cao su",price:20000,img:"https://picsum.photos/200?1"},
{name:"Băng vệ sinh",price:20000,img:"https://picsum.photos/200?2"},
{name:"Chocolate tình yêu",price:300000,img:"https://picsum.photos/200?3"},
{name:"Thuốc tránh thai",price:30000,img:"https://picsum.photos/200?4"},
{name:"Thuốc cảm",price:10000,img:"https://picsum.photos/200?5"},
{name:"Kẹo ngọt",price:30000,img:"https://picsum.photos/200?6"},
{name:"Sữa Vinamilk",price:30000,img:"https://picsum.photos/200?7"},
{name:"Redbull",price:15000,img:"https://picsum.photos/200?8"}
];

let cart=[];
let selected=null;

function render(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div class="product">
            <img src="${p.img}">
            <h4>${p.name}</h4>
            <div class="price">${p.price}đ</div>
            <button class="add-btn" onclick="openPopup(${i})">+</button>
        </div>`;
    });
    document.getElementById("products").innerHTML=html;
}
render();

function openPopup(i){
    selected=i;
    popup.classList.add("active");
}

function addToCart(){
    let qty=parseInt(quantity.value);
    let p=products[selected];

    cart.push({...p,qty});
    count.innerText=cart.length;

    popup.classList.remove("active");

    flyEffect(p.img);
}

function flyEffect(src){
    let img=document.createElement("img");
    img.src=src;
    img.className="fly";
    document.body.appendChild(img);

    img.style.left="50%";
    img.style.top="50%";

    setTimeout(()=>{
        img.style.left="90%";
        img.style.top="5%";
        img.style.opacity="0";
    },100);

    setTimeout(()=>img.remove(),1000);
}

function openCart(){
    cartPage.classList.toggle("active");
    renderCart();
}

function renderCart(){
    let html="";
    let total=0;

    cart.forEach(item=>{
        total+=item.price*item.qty;
        html+=`<div class="cart-item">${item.name} x${item.qty} = ${item.price*item.qty}đ</div>`;
    });

    cartItems.innerHTML=html;
    totalText= "Tổng: "+total+"đ";
    total.innerText=totalText;
}

function checkout(){
    alert("Thanh toán thành công 💖");
    sound.play();
}
</script>

</body>
</html>
