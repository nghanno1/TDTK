<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIVATE BOX</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
background:linear-gradient(120deg,#ffd6ec,#ffe3f3,#e0f7ff);
overflow-x:hidden;
}

/* START */
.start-screen{
position:fixed;
width:100%;height:100%;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
gap:20px;
background:linear-gradient(135deg,#ffc0cb,#ffe3f3,#d0f0ff);
z-index:999;
}

.start-btn{
padding:15px 30px;
border:none;border-radius:30px;
color:white;font-size:18px;
cursor:pointer;
transition:0.3s;
}

.start-btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #ff4d88;
}

.buy-now{background:linear-gradient(45deg,#ff7eb3,#ff4d88);}
.private-mode{background:linear-gradient(45deg,#6a5acd,#00c9ff);}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
font-weight:800;
color:#ff4d88;
}

.back-home{
background:linear-gradient(45deg,#ff7eb3,#ff4d88);
color:white;border:none;
padding:8px 14px;border-radius:20px;
cursor:pointer;
transition:0.3s;
}
.back-home:hover{transform:scale(1.1);}

.cart-icon{
position:relative;
cursor:pointer;
font-size:20px;
}

.cart-count{
position:absolute;
top:-8px;right:-10px;
background:#ff4d88;color:white;
border-radius:50%;
padding:3px 7px;
}

/* PRODUCTS */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(12px);
border-radius:20px;
padding:15px;
text-align:center;
transition:0.4s;
}

.product:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 10px 25px rgba(255,0,100,0.2);
}

.product img{
width:100%;
height:130px;
object-fit:contain;
}

.price{color:#ff4d88;margin:10px 0;}

/* BUTTON */
.add-btn{
background:linear-gradient(45deg,#ff7eb3,#ff4d88);
border:none;color:white;
padding:10px;
border-radius:50%;
cursor:pointer;
position:relative;
overflow:hidden;
}

.add-btn:after{
content:"";
position:absolute;
width:0;height:0;
background:rgba(255,255,255,0.5);
border-radius:50%;
top:50%;left:50%;
transform:translate(-50%,-50%);
transition:0.4s;
}

.add-btn:active:after{
width:100px;height:100px;
}

/* POPUP */
.popup{
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
padding:25px;
border-radius:20px;
transition:0.3s;
z-index:10;
}
.popup.active{transform:translate(-50%,-50%) scale(1);}

/* CART GLASS */
.cart-page{
position:fixed;
right:-100%;
top:0;
width:350px;
height:100%;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(15px);
padding:20px;
transition:0.5s;
display:flex;
flex-direction:column;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
}
.cart-page.active{right:0;}

.cart-item{
background:white;
padding:12px;
margin:10px 0;
border-radius:12px;
animation:fadeIn 0.4s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateX(20px);}
to{opacity:1;transform:translateX(0);}
}

/* TOTAL */
.total-box{
font-weight:bold;
color:white;
padding:12px;
border-radius:15px;
background:linear-gradient(45deg,#ff7eb3,#ff4d88);
margin-top:10px;
text-align:center;
}

/* CHECKOUT */
.checkout-btn{
margin-top:auto;
padding:14px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#ff7eb3,#ff4d88);
color:white;
font-size:16px;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="start-screen" id="startScreen">
<h1>💖 PRIVATE BOX</h1>
<button class="start-btn buy-now" onclick="startShop()">Mua ngay</button>
<button class="start-btn private-mode" onclick="startShop()">🔒 Bảo mật</button>
</div>

<div class="header">
<button class="back-home" onclick="goHome()">🏠</button>
PRIVATE BOX
<div class="cart-icon" onclick="openCart()">🛒 <span id="count">0</span></div>
</div>

<div class="container" id="products"></div>

<div class="popup" id="popup">
<input type="number" id="quantity" value="1">
<br><br>
<button onclick="addToCart()">Thêm</button>
</div>

<div class="cart-page" id="cartPage">
<h2>🛍 Giỏ hàng</h2>
<button onclick="closeCart()">⬅</button>
<div id="cartItems"></div>
<div class="total-box" id="total">Tổng: 0đ</div>
<button class="checkout-btn" onclick="checkout()">Thanh toán</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJepauf7yjwoenS_j1a2CtmSsjagHz2kA",
  databaseURL: "https://private-box-83109-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const productList=[
{name:"Viên uống bổ sung sinh lý nam (hàu, kẽm)",price:120000,img:""},
{name:"Nước uống tăng năng lượng (Red Bull, Sting…)",price:15000,img:""},
{name:"Khăn giấy ướt",price:15000,img:""},
{name:"Dung dịch vệ sinh cá nhân",price:80000,img:""},
{name:"Bao cao su nữ (ít phổ biến)",price:50000,img:""},
{name:"Gel massage thư giãn",price:100000,img:""},
{name:"Nến thơm",price:70000,img:""},
{name:"Nước hoa mini",price:120000,img:""},
{name:"Thuốc tránh thai khẩn cấp loại phổ thông",price:25000,img:""},
{name:"Thuốc tránh thai khẩn cấp loại tốt (Postinor)",price:60000,img:""},
{name:"Mì gói",price:7000,img:""},
{name:"Bánh Oreo gói nhỏ",price:26000,img:""},
{name:"Snack Poca nhỏ",price:6000,img:""},
{name:"Xúc xích tiệt trùng",price:10000,img:""},
{name:"Nước suối chai 500ml",price:10000,img:""},
{name:"Nước ngọt lon (Coca/Pepsi)",price:15000,img:""},
{name:"Trà đóng chai C2",price:10000,img:""},
{name:"Cà phê lon",price:20000,img:""}
];

let cart=[],selected=null;

function startShop(){startScreen.style.display="none";render();}
function goHome(){startScreen.style.display="flex";}

function render(){
products.innerHTML=productList.map((p,i)=>`
<div class="product">
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="price">${p.price.toLocaleString()}đ</div>
<button class="add-btn" onclick="openPopup(${i})">+</button>
</div>`).join("");
}

function openPopup(i){selected=i;popup.classList.add("active");}
function addToCart(){
cart.push({...productList[selected],qty:quantity.value});
count.innerText=cart.length;
popup.classList.remove("active");
}

function openCart(){cartPage.classList.add("active");renderCart();}
function closeCart(){cartPage.classList.remove("active");}

function renderCart(){
let totalPrice=0;
cartItems.innerHTML=cart.map(item=>{
totalPrice+=item.price*item.qty;
return `<div class="cart-item">${item.name} x${item.qty}</div>`;
}).join("");

document.getElementById("total").innerText="Tổng: "+totalPrice.toLocaleString()+"đ";
}

function checkout(){
    // ❌ nếu giỏ hàng trống
    if(cart.length === 0){
        alert("Giỏ hàng trống!");
        return;
    }

    // 💰 tính tổng tiền
    let totalPrice = cart.reduce((sum, item) => {
        return sum + item.price * item.qty;
    }, 0);

    // 🔢 tạo mã đơn 6 số (không trùng gần như tuyệt đối)
    let code = Date.now().toString().slice(-6);

    // 📦 tạo object đơn hàng
    const order = {
        code: code,
        items: cart,
        total: totalPrice,
        time: new Date().toLocaleString()
    };

    // 🚀 gửi lên Firebase
    push(ref(db, "orders"), order);

    // ✅ thông báo cho khách
    alert(`Thanh toán thành công 💖
Mã đơn: ${code}
Tổng: ${totalPrice.toLocaleString()}đ`);

    // 🔄 reset giỏ hàng
    cart = [];
    count.innerText = 0;
    cartItems.innerHTML = "";
    document.getElementById("total").innerText = "Tổng: 0đ";
    cartPage.classList.remove("active");
}
window.startShop = startShop;
window.goHome = goHome;
window.openPopup = openPopup;
window.addToCart = addToCart;
window.openCart = openCart;
window.closeCart = closeCart;
window.checkout = checkout;
</script>

</body>
</html>
