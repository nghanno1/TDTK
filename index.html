<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIVATE BOX</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
    background:linear-gradient(120deg,#ffd6ec,#ffe3f3,#e0f7ff);
}

/* START */
.start-screen{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
    background:linear-gradient(135deg,#ffc0cb,#ffe3f3,#d0f0ff);
    z-index:999;
}

.start-btn{
    padding:15px 30px;
    border:none;
    border-radius:30px;
    color:white;
    cursor:pointer;
    font-size:18px;
}

.buy-now{background:linear-gradient(45deg,#ff7eb3,#ff4d88);}
.private-mode{background:linear-gradient(45deg,#6a5acd,#00c9ff);}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    font-size:22px;
    font-weight:800;
    color:#ff4d88;
}

/* BACK HOME BUTTON */
.back-home{
    background:linear-gradient(45deg,#ff7eb3,#ff4d88);
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}
.back-home:hover{
    transform:scale(1.1);
}

/* CART */
.cart-icon{
    position:relative;
    cursor:pointer;
}
.cart-count{
    position:absolute;
    top:-8px;
    right:-10px;
    background:#ff4d88;
    color:white;
    border-radius:50%;
    padding:3px 7px;
}

/* PRODUCTS */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.product{
    background:white;
    border-radius:20px;
    padding:15px;
    text-align:center;
}

.product img{
    width:100%;
    height:130px;
    object-fit:contain;
}

.price{
    color:#ff4d88;
    margin:10px 0;
}

.add-btn{
    background:#ff4d88;
    color:white;
    border:none;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}

/* POPUP */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:white;
    padding:20px;
    border-radius:15px;
    transition:0.3s;
}
.popup.active{transform:translate(-50%,-50%) scale(1);}

/* CART PAGE */
.cart-page{
    position:fixed;
    right:-100%;
    top:0;
    width:350px;
    height:100%;
    background:white;
    padding:20px;
    transition:0.4s;
    display:flex;
    flex-direction:column;
}
.cart-page.active{right:0;}

.cart-item{
    background:#fff0f6;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

/* TOTAL FIX */
.total-box{
    font-weight:bold;
    margin-top:10px;
    color:#ff4d88;
}

/* BUTTON */
.checkout-btn{
    margin-top:auto;
    padding:12px;
    background:#ff4d88;
    border:none;
    border-radius:20px;
    color:white;
}
</style>
</head>

<body>

<!-- START -->
<div class="start-screen" id="startScreen">
<h1>💖 PRIVATE BOX</h1>
<button class="start-btn buy-now" onclick="startShop()">Mua ngay</button>
<button class="start-btn private-mode" onclick="startShop()">🔒 Mua bảo mật</button>
</div>

<!-- HEADER -->
<div class="header">
<button class="back-home" onclick="goHome()">🏠 Trang đầu</button>
PRIVATE BOX
<div class="cart-icon" onclick="openCart()">🛒 <span id="count">0</span></div>
</div>

<div class="container" id="products"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<input type="number" id="quantity" value="1" min="1">
<br><br>
<button onclick="addToCart()">Thêm</button>
</div>

<!-- CART -->
<div class="cart-page" id="cartPage">
<h2>🛍 Giỏ hàng</h2>
<button onclick="closeCart()">⬅ Quay lại</button>
<div id="cartItems"></div>
<div class="total-box" id="total">Tổng: 0đ</div>
<button class="checkout-btn" onclick="checkout()">Thanh toán</button>
</div>

<script>
const productList=[
{name:"Bao cao su",price:20000,img:"https://cdn-icons-png.flaticon.com/512/3209/3209265.png"},
{name:"Băng vệ sinh",price:20000,img:"https://cdn-icons-png.flaticon.com/512/2965/2965567.png"},
{name:"Chocolate tình yêu",price:300000,img:"https://cdn-icons-png.flaticon.com/512/685/685352.png"},
{name:"Thuốc tránh thai",price:30000,img:"https://cdn-icons-png.flaticon.com/512/4320/4320371.png"},
{name:"Thuốc cảm",price:10000,img:"https://cdn-icons-png.flaticon.com/512/2966/2966327.png"},
{name:"Kẹo ngọt",price:30000,img:"https://cdn-icons-png.flaticon.com/512/3075/3075977.png"},
{name:"Sữa Vinamilk",price:30000,img:"https://cdn-icons-png.flaticon.com/512/2935/2935393.png"},
{name:"Redbull",price:15000,img:"https://cdn-icons-png.flaticon.com/512/3050/3050156.png"}
];

let cart=[];
let selected=null;

/* START */
function startShop(){
startScreen.style.display="none";
render();
}

function goHome(){
startScreen.style.display="flex";
}

/* RENDER */
function render(){
let html="";
productList.forEach((p,i)=>{
html+=`
<div class="product">
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="price">${p.price.toLocaleString()}đ</div>
<button class="add-btn" onclick="openPopup(${i})">+</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

/* POPUP */
function openPopup(i){
selected=i;
popup.classList.add("active");
}

function addToCart(){
let qty=parseInt(quantity.value);
cart.push({...productList[selected],qty});
count.innerText=cart.length;
popup.classList.remove("active");
}

/* CART */
function openCart(){
cartPage.classList.add("active");
renderCart();
}
function closeCart(){
cartPage.classList.remove("active");
}

function renderCart(){
let html="";
let totalPrice=0;

cart.forEach(item=>{
totalPrice+=item.price*item.qty;
html+=`<div class="cart-item">${item.name} x${item.qty}</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Tổng: "+totalPrice.toLocaleString()+"đ";
}

/* CHECKOUT */
function checkout(){
let totalPrice=0;
cart.forEach(item=> totalPrice+=item.price*item.qty);

let code=Math.floor(100000+Math.random()*900000);

alert(`Thanh toán thành công 💖
Mã đơn: ${code}
Tổng tiền: ${totalPrice.toLocaleString()}đ`);

cart=[];
count.innerText=0;
cartItems.innerHTML="";
document.getElementById("total").innerText="Tổng: 0đ";
cartPage.classList.remove("active");
}
</script>

</body>
</html>
