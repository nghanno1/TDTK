<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIVATE BOX</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
    background:linear-gradient(120deg,#ffd6ec,#ffe3f3,#e0f7ff);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    padding:20px;
    font-size:24px;
    font-weight:800;
    color:#ff4d88;
}

.cart-icon{
    position:relative;
    cursor:pointer;
}

.cart-count{
    position:absolute;
    top:-8px;
    right:-10px;
    background:#ff4d88;
    color:white;
    border-radius:50%;
    padding:3px 7px;
}

/* PRODUCTS */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.product{
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:15px;
    text-align:center;
    transition:0.3s;
}

.product:hover{
    transform:translateY(-8px) scale(1.05);
}

.product img{
    width:100%;
    height:130px;
    object-fit:contain;
}

.price{
    color:#ff4d88;
    margin:10px 0;
}

/* BUTTON */
.add-btn{
    background:linear-gradient(45deg,#ff7eb3,#ff4d88);
    border:none;
    color:white;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}

/* POPUP */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:white;
    padding:25px;
    border-radius:20px;
    text-align:center;
    transition:0.3s;
}
.popup.active{transform:translate(-50%,-50%) scale(1);}

/* CART */
.cart-page{
    position:fixed;
    right:-100%;
    top:0;
    width:350px;
    height:100%;
    background:white;
    padding:20px;
    transition:0.4s;
    display:flex;
    flex-direction:column;
}
.cart-page.active{right:0;}

.cart-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* BACK BUTTON */
.back-btn{
    background:linear-gradient(45deg,#ff7eb3,#ff4d88);
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:50px;
    cursor:pointer;
    transition:0.3s;
}

.back-btn:hover{
    transform:translateX(-5px) scale(1.1);
    box-shadow:0 0 10px #ff4d88;
}

/* CART ITEM */
.cart-item{
    background:#fff0f6;
    margin:10px 0;
    padding:10px;
    border-radius:10px;
}

/* CHECKOUT */
.checkout-btn{
    margin-top:auto;
    padding:12px;
    background:linear-gradient(45deg,#ff7eb3,#ff4d88);
    border:none;
    border-radius:20px;
    color:white;
}

/* FLY */
.fly-img{
    position:fixed;
    width:50px;
    z-index:999;
    pointer-events:none;
}

/* HEART */
.heart{
    position:absolute;
    font-size:20px;
    animation:float 1s ease forwards;
}
@keyframes float{
    to{transform:translateY(-120px);opacity:0;}
}
</style>
</head>

<body>

<div class="header">
💖 PRIVATE BOX
<div class="cart-icon" onclick="openCart()">
🛒 <span class="cart-count" id="count">0</span>
</div>
</div>

<div class="container" id="products"></div>

<div class="popup" id="popup">
<h3>Chọn số lượng 💕</h3>
<input type="number" id="quantity" value="1" min="1">
<br><br>
<button onclick="addToCart()">Thêm</button>
</div>

<div class="cart-page" id="cartPage">
<div class="cart-header">
<h2>🛍 Giỏ hàng</h2>
<button class="back-btn" onclick="closeCart()">⬅ Quay lại</button>
</div>
<div id="cartItems"></div>
<h3 id="total">Tổng: 0đ</h3>
<button class="checkout-btn" onclick="checkout()">Thanh toán 💳</button>
</div>

<script>
const productList=[
{name:"Bao cao su",price:20000,img:"https://cdn-icons-png.flaticon.com/512/3209/3209265.png"},
{name:"Băng vệ sinh",price:20000,img:"https://cdn-icons-png.flaticon.com/512/2965/2965567.png"},
{name:"Chocolate tình yêu",price:300000,img:"https://cdn-icons-png.flaticon.com/512/685/685352.png"},
{name:"Thuốc tránh thai",price:30000,img:"https://cdn-icons-png.flaticon.com/512/4320/4320371.png"},
{name:"Thuốc cảm",price:10000,img:"https://cdn-icons-png.flaticon.com/512/2966/2966327.png"},
{name:"Kẹo ngọt",price:30000,img:"https://cdn-icons-png.flaticon.com/512/3075/3075977.png"},
{name:"Sữa Vinamilk",price:30000,img:"https://cdn-icons-png.flaticon.com/512/2935/2935393.png"},
{name:"Nước tăng lực Redbull",price:15000,img:"https://cdn-icons-png.flaticon.com/512/3050/3050156.png"}
];

let cart=[];
let selected=null;
let currentButton=null;

function render(){
let html="";
productList.forEach((p,i)=>{
html+=`
<div class="product">
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="price">${p.price.toLocaleString()}đ</div>
<button class="add-btn" onclick="openPopup(${i},this)">+</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}
render();

function openPopup(i,btn){
selected=i;
currentButton=btn;
document.getElementById("popup").classList.add("active");
}

function addToCart(){
let qty=parseInt(document.getElementById("quantity").value);
let p=productList[selected];

cart.push({...p,qty});
document.getElementById("count").innerText=cart.length;

document.getElementById("popup").classList.remove("active");

flyBezier(p.img,currentButton);
heartEffect();
}

function flyBezier(src,btn){
const cartIcon=document.querySelector(".cart-icon");
const start=btn.getBoundingClientRect();
const end=cartIcon.getBoundingClientRect();

const img=document.createElement("img");
img.src=src;
img.className="fly-img";
document.body.appendChild(img);

let x0=start.left,y0=start.top;
let x2=end.left,y2=end.top;
let x1=(x0+x2)/2;
let y1=y0-150;

let t=0;
function animate(){
t+=0.05;
let x=(1-t)*(1-t)*x0+2*(1-t)*t*x1+t*t*x2;
let y=(1-t)*(1-t)*y0+2*(1-t)*t*y1+t*t*y2;

img.style.left=x+"px";
img.style.top=y+"px";
img.style.transform="scale("+(1-t)+")";

if(t<1) requestAnimationFrame(animate);
else img.remove();
}
animate();
}

function heartEffect(){
for(let i=0;i<5;i++){
let h=document.createElement("div");
h.innerHTML="💖";
h.className="heart";
h.style.left=Math.random()*100+"%";
h.style.top="60%";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1000);
}
}

function openCart(){
document.getElementById("cartPage").classList.add("active");
renderCart();
}

function closeCart(){
document.getElementById("cartPage").classList.remove("active");
}

function renderCart(){
let html="";
let total=0;

cart.forEach(item=>{
total+=item.price*item.qty;
html+=`<div class="cart-item">${item.name} x${item.qty}</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Tổng: "+total.toLocaleString()+"đ";
}

function checkout(){
alert("Thanh toán thành công 💖");

cart=[];
document.getElementById("cartItems").innerHTML="";
document.getElementById("total").innerText="Tổng: 0đ";
document.getElementById("count").innerText=0;

document.getElementById("cartPage").classList.remove("active");
}
</script>

</body>
</html>
