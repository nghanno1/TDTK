<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIVATE BOX</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    background: linear-gradient(120deg,#ffd6ec,#ffe3f1,#e0f7ff);
    min-height:100vh;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    padding:20px;
    font-size:24px;
    font-weight:800;
    color:#ff4d88;
}

.cart-icon{
    position:relative;
    cursor:pointer;
    transition:0.3s;
}
.cart-icon:hover{
    transform:scale(1.2);
}

.cart-count{
    position:absolute;
    top:-8px;
    right:-10px;
    background:#ff4d88;
    color:white;
    border-radius:50%;
    padding:3px 7px;
    font-size:12px;
}

/* PRODUCTS */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.product{
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-radius:25px;
    padding:15px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(255,100,150,0.2);
}

.product:hover{
    transform:translateY(-8px) scale(1.05);
}

.product img{
    width:100%;
    height:140px;
    object-fit:contain;
}

.price{
    margin:10px 0;
    color:#ff4d88;
    font-weight:600;
}

/* BUTTON */
.add-btn{
    background: linear-gradient(45deg,#ff7eb3,#ff4d88);
    border:none;
    color:white;
    padding:10px;
    border-radius:50%;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}
.add-btn:hover{
    transform:scale(1.3) rotate(10deg);
    box-shadow:0 0 10px #ff4d88;
}

/* POPUP */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(15px);
    padding:25px;
    border-radius:20px;
    text-align:center;
    transition:0.3s;
    z-index:100;
}

.popup.active{
    transform:translate(-50%,-50%) scale(1);
}

.popup input{
    width:80px;
    padding:8px;
    border-radius:10px;
    border:1px solid #ddd;
}

.popup button{
    margin-top:10px;
    background:#ff4d88;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:20px;
}

/* CART */
.cart-page{
    position:fixed;
    right:-100%;
    top:0;
    width:350px;
    height:100%;
    background: linear-gradient(180deg,#fff,#ffe6f2);
    padding:20px;
    transition:0.4s;
    box-shadow:-5px 0 20px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
}

.cart-page.active{
    right:0;
}

.cart-header{
    display:flex;
    justify-content:space-between;
}

.back-btn{
    background:#ffd6ec;
    border:none;
    padding:5px 10px;
    border-radius:10px;
    cursor:pointer;
}

.cart-item{
    margin:10px 0;
    padding:10px;
    background:white;
    border-radius:10px;
}

/* CHECKOUT */
.checkout-btn{
    margin-top:auto;
    padding:12px;
    background:linear-gradient(45deg,#ff7eb3,#ff4d88);
    border:none;
    border-radius:20px;
    color:white;
}

/* FLY */
.fly{
    position:absolute;
    width:60px;
    z-index:999;
    transition:all 0.8s cubic-bezier(.5,-0.5,.5,1.5);
}
</style>
</head>

<body>

<div class="header">
    💖 PRIVATE BOX
    <div class="cart-icon" onclick="openCart()">
        🛒 <span class="cart-count" id="count">0</span>
    </div>
</div>

<div class="container" id="products"></div>

<!-- POPUP -->
<div class="popup" id="popup">
    <h3>Chọn số lượng 💕</h3>
    <input type="number" id="quantity" value="1" min="1">
    <br>
    <button onclick="addToCart()">Thêm vào giỏ</button>
</div>

<!-- CART -->
<div class="cart-page" id="cartPage">
    <div class="cart-header">
        <h2>🛍 Giỏ hàng</h2>
        <button class="back-btn" onclick="closeCart()">←</button>
    </div>
    <div id="cartItems"></div>
    <h3 id="total"></h3>
    <button class="checkout-btn" onclick="checkout()">Thanh toán 💳</button>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>

<script>
const products=[
{name:"Bao cao su",price:20000,img:"https://cdn-icons-png.flaticon.com/512/3209/3209265.png"},
{name:"Băng vệ sinh",price:20000,img:"https://cdn-icons-png.flaticon.com/512/2965/2965567.png"},
{name:"Chocolate tình yêu",price:300000,img:"https://cdn-icons-png.flaticon.com/512/685/685352.png"},
{name:"Thuốc tránh thai",price:30000,img:"https://cdn-icons-png.flaticon.com/512/4320/4320371.png"},
{name:"Thuốc cảm",price:10000,img:"https://cdn-icons-png.flaticon.com/512/2966/2966327.png"},
{name:"Kẹo ngọt",price:30000,img:"https://cdn-icons-png.flaticon.com/512/3075/3075977.png"},
{name:"Sữa Vinamilk",price:30000,img:"https://cdn-icons-png.flaticon.com/512/2935/2935393.png"},
{name:"Nước tăng lực Redbull",price:15000,img:"https://cdn-icons-png.flaticon.com/512/3050/3050156.png"}
];

let cart=[];
let selected=null;

function render(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div class="product">
            <img src="${p.img}">
            <h4>${p.name}</h4>
            <div class="price">${p.price.toLocaleString()}đ</div>
            <button class="add-btn" onclick="openPopup(${i})">+</button>
        </div>`;
    });
    products.innerHTML=html;
}
render();

function openPopup(i){
    selected=i;
    popup.classList.add("active");
}

function addToCart(){
    let qty=parseInt(quantity.value);
    let p=products[selected];

    cart.push({...p,qty});
    count.innerText=cart.length;

    popup.classList.remove("active");

    flyEffect(p.img);
}

function flyEffect(src){
    let img=document.createElement("img");
    img.src=src;
    img.className="fly";
    document.body.appendChild(img);

    img.style.left="50%";
    img.style.top="50%";

    setTimeout(()=>{
        img.style.left="90%";
        img.style.top="5%";
        img.style.opacity="0";
    },100);

    setTimeout(()=>img.remove(),800);
}

function openCart(){
    cartPage.classList.add("active");
    renderCart();
}

function closeCart(){
    cartPage.classList.remove("active");
}

function renderCart(){
    let html="";
    let total=0;

    cart.forEach(item=>{
        total+=item.price*item.qty;
        html+=`<div class="cart-item">${item.name} x${item.qty} = ${(item.price*item.qty).toLocaleString()}đ</div>`;
    });

    cartItems.innerHTML=html;
    totalText="Tổng: "+total.toLocaleString()+"đ";
    total.innerText=totalText;
}

function checkout(){
    alert("Thanh toán thành công 💖");
    sound.play();
}
</script>

</body>
</html>
